name: Idealista Apartment Bot
version: "1.1.0"
slug: idealista_bot
description: Apartment finder for Valencia using Idealista
arch:
  - amd64
startup: application
boot: auto
init: false
image: "ghcr.io/home-assistant/{arch}-base:latest"
options:
  city: "valencia-valencia"
  max_price: 1500
  pets: false
  interval_minutes: 30
schema:
  city: str
  max_price: int
  pets: bool
  interval_minutes: int
