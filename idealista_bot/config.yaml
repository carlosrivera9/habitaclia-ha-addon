name: Idealista Apartment Bot
version: "1.0.1"
slug: idealista_bot
description: Apartment finder for Valencia
arch:
  - amd64
startup: application
boot: auto
init: false
build_from:
  amd64: ghcr.io/home-assistant/amd64-base:latest
options:
  max_price: 1500
  city: Valencia
  pets: true
schema:
  max_price: int
  city: str
  pets: bool
